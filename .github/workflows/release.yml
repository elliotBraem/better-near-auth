name: Release

on:
  workflow_dispatch:
    inputs:
      force_release:
        description: "Publish package releases even when changesets were just consumed"
        required: false
        type: boolean
        default: false
      ref:
        description: "Git ref or SHA to release"
        required: false
        default: ""
        type: string
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Publish Packages
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'
    env:
      TARGET_REF: ${{ inputs.ref != '' && inputs.ref || github.sha }}
    outputs:
      should_publish: ${{ steps.release_mode.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_REF }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.2.20"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create release PR when changesets are pending
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: pnpm run version
          publish: "echo 'Skipping built-in publish; handled in subsequent steps'"
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Determine release mode
        id: release_mode
        env:
          HAS_CHANGESETS: ${{ steps.changesets.outputs.hasChangesets }}
          FORCE_RELEASE: ${{ inputs.force_release && 'true' || 'false' }}
        run: |
          if [ "$HAS_CHANGESETS" = "false" ] || [ "$FORCE_RELEASE" = "true" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package to npm
        if: steps.release_mode.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(jq -r .version package.json)
          NAME=$(jq -r .name package.json)

          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already published, skipping"
          else
            npm publish --provenance --access public
          fi

      - name: Create GitHub Release
        if: steps.release_mode.outputs.should_publish == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r '.version' package.json)
          NAME=$(jq -r '.name' package.json)
          TAG="${NAME}@${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi

          CHANGELOG="CHANGELOG.md"
          NOTES=""
          if [ -f "$CHANGELOG" ]; then
            NOTES=$(sed -n "/^## ${VERSION}/,/^## [0-9]/p" "$CHANGELOG" | sed '$d' | tail -n +2)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG"
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            --target main

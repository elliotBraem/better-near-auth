name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Bump example catalog version
        if: steps.changesets.outputs.published == 'true'
        run: |
          NEW_VERSION=$(node -e "const published = JSON.parse(process.env.PUBLISHED_PACKAGES || '[]'); const pkg = published.find((entry) => entry.name === 'better-near-auth'); if (!pkg) process.exit(1); process.stdout.write(pkg.version)")
          CATALOG_FILE="examples/auth.everything.dev/package.json"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('$CATALOG_FILE', 'utf8'));
            pkg.workspaces.catalog['better-near-auth'] = '^' + '$NEW_VERSION';
            fs.writeFileSync('$CATALOG_FILE', JSON.stringify(pkg, null, 2) + '\n');
          "
          git add "$CATALOG_FILE"
          git commit -m "chore: bump example catalog to better-near-auth@${NEW_VERSION}"
          git push
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}

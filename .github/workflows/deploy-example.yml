name: Deploy Example App

on:
  push:
    branches:
      - main
    paths:
      - 'examples/auth.everything.dev/**'
      - '!examples/auth.everything.dev/bun.lock'
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy auth.everything.dev
    runs-on: ubuntu-latest
    env:
      ZE_SECRET_TOKEN: ${{ secrets.ZEPHYR_AUTH_TOKEN }}
      ZE_SERVER_TOKEN: ${{ secrets.ZEPHYR_SERVER_AUTH_TOKEN }}
      ZE_USER_EMAIL: ${{ secrets.ZEPHYR_USER_EMAIL }}
      BOS_INSTALL_NEAR_CLI: "true"
      NEAR_PRIVATE_KEY: ${{ secrets.NEAR_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.20"

      - name: Install dependencies
        working-directory: examples/auth.everything.dev
        run: bun install

      - name: Generate route tree
        working-directory: examples/auth.everything.dev/ui
        run: bun run generate-routes

      - name: Lint and typecheck
        working-directory: examples/auth.everything.dev
        run: |
          bun lint
          bun typecheck

      - name: Test
        working-directory: examples/auth.everything.dev
        run: bun test

      - name: Build and deploy
        working-directory: examples/auth.everything.dev
        run: bun run deploy

      - name: Publish config to FastKV
        working-directory: examples/auth.everything.dev
        run: bun run publish

      - name: Commit updated lockfile
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(deploy-example): update lockfile after release deploy"
          file_pattern: examples/auth.everything.dev/bun.lock

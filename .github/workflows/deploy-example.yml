name: Deploy Example App

on:
  push:
    branches:
      - main
  release:
    types: [published]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy auth.everything.dev
    runs-on: ubuntu-latest
    env:
      ZE_SECRET_TOKEN: ${{ secrets.ZEPHYR_AUTH_TOKEN }}
      ZE_SERVER_TOKEN: ${{ secrets.ZEPHYR_SERVER_AUTH_TOKEN }}
      ZE_USER_EMAIL: ${{ secrets.ZEPHYR_USER_EMAIL }}
      BOS_INSTALL_NEAR_CLI: "true"
      NEAR_PRIVATE_KEY: ${{ secrets.NEAR_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: github.event_name == 'push'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        if: github.event_name == 'push'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.20"

      - name: Install root dependencies
        if: github.event_name == 'push'
        run: pnpm install --frozen-lockfile

      - name: Build and pack local better-near-auth
        if: github.event_name == 'push'
        id: pack_local
        run: |
          mkdir -p "$RUNNER_TEMP/better-near-auth-pack"
          pnpm build
          TARBALL=$(pnpm pack --pack-destination "$RUNNER_TEMP/better-near-auth-pack" --json | jq -r '.filename')
          echo "TARBALL=$TARBALL" >> $GITHUB_OUTPUT

      - name: Get version from release
        id: get_version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Extract version from tag like better-near-auth@1.2.0
            VERSION="${GITHUB_REF#refs/tags/}"
            VERSION="${VERSION#*@}"
          else
            # Fallback: read from package.json on push triggers
            VERSION=$(jq -r '.version' package.json)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update better-near-auth version in example
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TARBALL="${{ steps.pack_local.outputs.TARBALL }}"
            jq --arg tarball "$TARBALL" '.dependencies["better-near-auth"] = $tarball' \
              examples/auth.everything.dev/package.json > examples/auth.everything.dev/package.json.tmp
            mv examples/auth.everything.dev/package.json.tmp examples/auth.everything.dev/package.json

            jq --arg tarball "$TARBALL" '.dependencies["better-near-auth"] = $tarball' \
              examples/auth.everything.dev/ui/package.json > examples/auth.everything.dev/ui/package.json.tmp
            mv examples/auth.everything.dev/ui/package.json.tmp examples/auth.everything.dev/ui/package.json

            jq --arg tarball "$TARBALL" '.dependencies["better-near-auth"] = $tarball' \
              examples/auth.everything.dev/plugins/auth/package.json > examples/auth.everything.dev/plugins/auth/package.json.tmp
            mv examples/auth.everything.dev/plugins/auth/package.json.tmp examples/auth.everything.dev/plugins/auth/package.json
          else
            VERSION="${{ steps.get_version.outputs.VERSION }}"
            jq --arg v "$VERSION" '.workspaces.catalog["better-near-auth"] = "^" + $v | .dependencies["better-near-auth"] = "^" + $v' \
              examples/auth.everything.dev/package.json > examples/auth.everything.dev/package.json.tmp
            mv examples/auth.everything.dev/package.json.tmp examples/auth.everything.dev/package.json

            jq --arg v "$VERSION" '.dependencies["better-near-auth"] = "catalog:"' \
              examples/auth.everything.dev/ui/package.json > examples/auth.everything.dev/ui/package.json.tmp
            mv examples/auth.everything.dev/ui/package.json.tmp examples/auth.everything.dev/ui/package.json

            jq --arg v "$VERSION" '.dependencies["better-near-auth"] = "^" + $v' \
              examples/auth.everything.dev/plugins/auth/package.json > examples/auth.everything.dev/plugins/auth/package.json.tmp
            mv examples/auth.everything.dev/plugins/auth/package.json.tmp examples/auth.everything.dev/plugins/auth/package.json
          fi

      - name: Install dependencies
        working-directory: examples/auth.everything.dev
        run: bun install

      - name: Lint and typecheck
        working-directory: examples/auth.everything.dev
        run: |
          bun lint
          bun typecheck

      - name: Build and deploy
        working-directory: examples/auth.everything.dev
        run: bun run deploy

      - name: Publish config to FastKV
        working-directory: examples/auth.everything.dev
        run: bun run publish

      - name: Commit updated files
        if: github.event_name == 'release'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(deploy-example): update to better-near-auth@${{ steps.get_version.outputs.VERSION }}"
          file_pattern: |
            examples/auth.everything.dev/package.json
            examples/auth.everything.dev/ui/package.json
            examples/auth.everything.dev/plugins/auth/package.json
            examples/auth.everything.dev/bun.lock
            examples/auth.everything.dev/bos.config.json

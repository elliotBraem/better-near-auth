name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".changeset/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run postinstall
        run: bun run postinstall

      - name: Security audit
        id: audit
        timeout-minutes: 5
        env:
          AUDIT_STRICT: ${{ secrets.AUDIT_STRICT }}
        run: |
          set +e -o pipefail
          timeout 120 bun audit 2>&1 | tee audit-output.txt
          audit_exit=$?
          if [ "$audit_exit" -eq 124 ]; then
            echo "::warning::bun audit timed out after 120s — skipping vulnerability check"
            exit 0
          fi
          if [ "$audit_exit" -gt 1 ]; then
            echo "::warning::bun audit exited with code $audit_exit — see output above"
            exit 0
          fi
          if grep -qiE '(critical|high)' audit-output.txt; then
            if [ "$AUDIT_STRICT" = "true" ]; then
              echo "::error::Critical or high vulnerabilities found — failing the audit"
              exit 1
            else
              echo "::warning::Critical or high vulnerabilities found — set AUDIT_STRICT=true secret to fail on these"
            fi
          fi

      - name: Run Biome lint and format check
        run: bun biome ci .

      - name: Run typecheck
        run: bun typecheck

      - name: Run tests
        run: bun run test

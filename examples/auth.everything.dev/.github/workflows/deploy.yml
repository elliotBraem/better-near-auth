name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Show full build output instead of clean summary'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy Production
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    env:
      NEAR_PRIVATE_KEY: ${{ secrets.NEAR_PRIVATE_KEY }}
      # Zephyr CI token — see https://docs.zephyr-cloud.io/migrations/ci-token-migration#create-a-ci-token
      ZE_CI_TOKEN: ${{ secrets.ZEPHYR_CI_TOKEN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      TARGET_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Sync to triggering commit
        run: git reset --hard "$TARGET_SHA"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run postinstall
        run: bun run postinstall

      - name: Install NEAR CLI
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/near/near-cli-rs/releases/download/v0.23.5/near-cli-rs-installer.sh | sh

      - name: Verify NEAR CLI
        run: near --version

      - name: Configure Zephyr auth fallback
        if: ${{ env.ZE_CI_TOKEN == '' }}
        env:
          ZEPHYR_AUTH_TOKEN: ${{ secrets.ZEPHYR_AUTH_TOKEN }}
          ZEPHYR_USER_EMAIL: ${{ secrets.ZEPHYR_USER_EMAIL }}
        run: |
          echo "ZE_SERVER_TOKEN=$ZEPHYR_AUTH_TOKEN" >> "$GITHUB_ENV"
          echo "ZE_USER_EMAIL=$ZEPHYR_USER_EMAIL" >> "$GITHUB_ENV"

      - name: Publish with deploy
        timeout-minutes: 20
        run: bun run bos publish --deploy${{ inputs.verbose == true && ' --verbose' || '' }}

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Redeploy Railway
        run: railway redeploy --service app --yes

      - name: Commit and push bos.config.json updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bos.config.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update deployment URLs [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin "$TARGET_BRANCH" && git push origin HEAD:"$TARGET_BRANCH" && exit 0
              sleep 3
            done
            exit 1
          fi

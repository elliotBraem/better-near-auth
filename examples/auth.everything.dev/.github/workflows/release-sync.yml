name: Release Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: "Build/deploy all workspaces before publish"
        required: false
        default: true
        type: boolean

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Build, Deploy & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      ZE_SECRET_TOKEN: ${{ secrets.ZEPHYR_AUTH_TOKEN }}
      ZE_SERVER_TOKEN: ${{ secrets.ZEPHYR_SERVER_AUTH_TOKEN }}
      ZE_USER_EMAIL: ${{ secrets.ZEPHYR_USER_EMAIL }}
      BOS_INSTALL_NEAR_CLI: "true"
      NEAR_PRIVATE_KEY: ${{ secrets.NEAR_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.2.20"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run postinstall
        run: bun run postinstall

      - name: Lint and typecheck
        run: |
          bun lint
          bun typecheck

      - name: Build and deploy
        if: inputs.deploy != false
        env:
          ZE_SECRET_TOKEN: ${{ secrets.ZEPHYR_AUTH_TOKEN }}
          ZE_SERVER_TOKEN: ${{ secrets.ZEPHYR_SERVER_AUTH_TOKEN }}
          ZE_USER_EMAIL: ${{ secrets.ZEPHYR_USER_EMAIL }}
        run: bun run deploy

      - name: Publish config to FastKV
        env:
          # To create a scoped FCAK, run `bos key publish`
          NEAR_PRIVATE_KEY: ${{ secrets.NEAR_PRIVATE_KEY }}
        run: bos publish

      - name: Commit bos.config.json updates
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5.2.0
        with:
          commit_message: "chore: update deployment URLs [skip ci]"
          file_pattern: "**/bos.config.json"

      - name: Deployment summary
        run: |
          echo "## Release Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Zephyr:** UI, API, plugins deployed" >> $GITHUB_STEP_SUMMARY
          echo "**FastKV:** bos.config.json published" >> $GITHUB_STEP_SUMMARY

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [release]
    if: hashFiles('Dockerfile')

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Lowercase repository name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893 # v5.9.0
        with:
          images: ghcr.io/${{ env.REPO }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

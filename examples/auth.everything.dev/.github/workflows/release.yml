name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version Packages
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    env:
      TARGET_REF: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_REF }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run postinstall
        run: bun run postinstall

      - name: Create release PR when changesets are pending
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: bun run version
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create GitHub Releases for versioned workspaces
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          changelogs=( */CHANGELOG.md plugins/*/CHANGELOG.md )
          shopt -u nullglob

          for changelog in "${changelogs[@]}"; do
            pkg_dir=$(dirname "$changelog")

            [[ "$(basename "$pkg_dir")" == _* ]] && continue

            PKG_JSON="$pkg_dir/package.json"
            [ ! -f "$PKG_JSON" ] && continue

            VERSION=$(jq -r '.version // empty' "$PKG_JSON")
            NAME=$(jq -r '.name // empty' "$PKG_JSON")
            [ -z "$VERSION" ] || [ -z "$NAME" ] && continue

            TAG="${NAME}@${VERSION}"

            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG already exists, skipping"
              continue
            fi

            NOTES=$(sed -n "/^## ${VERSION}/,/^## [0-9]/p" "$changelog" | sed '$d' | tail -n +2)
            [ -z "$NOTES" ] && NOTES="Release $TAG"

            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$NOTES" \
              --target "$TARGET_REF"
          done

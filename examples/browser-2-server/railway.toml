[build]
builder = "nixpacks"
buildCommand = "pnpm --filter better-near-auth build && pnpm --filter @b2s/server build"
watchPaths = ["src/**", "examples/browser-2-server/**"]

[deploy]
startCommand = "cd examples/browser-2-server/apps/server && pnpm start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

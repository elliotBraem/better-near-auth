      - mistake: 'Sending raw nonce bytes instead of hex-encoded string'
        mechanism: 'The nonce endpoint returns a hex-encoded string. The verify endpoint expects the same hex string. Sending raw bytes or a different encoding causes nonce decode failure.'
        wrong_pattern: |
          const nonce = new Uint8Array(32);
          await authClient.near.verify({
            signedMessage,
            message,
            recipient,
            nonce: nonce, // raw bytes, not hex string
            accountId,
          });
        correct_pattern: |
          const nonceBytes = generateNonce();
          const nonceHex = hex.encode(nonceBytes);
          // ...sign with nonceBytes via wallet...
          await authClient.near.verify({
            signedMessage,
            message,
            recipient,
            nonce: nonceHex, // hex-encoded string
            accountId,
          });
        source: 'src/types.ts:53-58, src/client.ts:106-109'
        priority: 'HIGH'
        status: 'active'
        skills: ['siwn', 'client']
      - mistake: 'Forgetting to generate DB schema after adding plugin'
        mechanism: 'The plugin adds nearAccount, relayedTransaction, and relayerKey tables. Without running the Better Auth CLI to generate the schema, the database will be missing these tables and all endpoints will fail.'
        wrong_pattern: |
          // Add siwn() to plugins, then start the server immediately
          export const auth = betterAuth({
            plugins: [siwn({ recipient: "myapp.com" })],
          });
        correct_pattern: |
          // Add siwn() to plugins, THEN generate schema
          export const auth = betterAuth({
            plugins: [siwn({ recipient: "myapp.com" })],
          });
          // Run: npx @better-auth/cli generate
        source: 'README.md:56-60'
        priority: 'HIGH'
        status: 'active'
        skills: ['siwn']
      - mistake: 'Network detected from wrong account ID format'
        mechanism: 'The network is auto-detected from accountId suffix (.testnet → testnet, otherwise → mainnet). Sending a mainnet accountId with networkId: "testnet" triggers a mismatch error.'
        wrong_pattern: |
          await authClient.near.nonce({
            accountId: "alice.near",
            networkId: "testnet", // mismatch — .near is mainnet
          });
        correct_pattern: |
          await authClient.near.nonce({
            accountId: "alice.near",
            networkId: "mainnet", // matches .near suffix
          });
        source: 'src/profile.ts:6-8, src/index.ts:546-552'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['siwn', 'client']
      - mistake: 'Not configuring parentAccount for sub-account creation with ephemeral relayer'
        mechanism: 'Ephemeral mode generates an implicit hex account that cannot own sub-accounts. Without setting subAccount.parentAccount or using an explicit named relayer, the server throws "Sub-account creation requires a named parent account".'
        wrong_pattern: |
          siwn({
            recipient: "myapp.com",
            relayer: {}, // ephemeral — implicit hex account
            subAccount: {},
          });
        correct_pattern: |
          siwn({
            recipient: "myapp.com",
            relayer: {
              accountId: "relayer.myapp.near",
              privateKey: process.env.RELAYER_PRIVATE_KEY,
            },
            subAccount: {
              parentAccount: "myapp.near",
            },
          });
        source: 'src/index.ts:1386-1393, src/index.ts:284-298'
        priority: 'HIGH'
        status: 'active'
        skills: ['siwn']
      - mistake: 'Forgetting parentKey when parent account differs from relayer'
        mechanism: 'The creation transaction must be signed by the parent account. When parentAccount differs from the relayer accountId, the server needs parentKey to sign, or it throws "Sub-account parent differs from relayer account".'
        wrong_pattern: |
          siwn({
            recipient: "myapp.com",
            relayer: { accountId: "relayer.myapp.near", privateKey: "..." },
            subAccount: { parentAccount: "user.parent.near" },
          });
        correct_pattern: |
          siwn({
            recipient: "myapp.com",
            relayer: { accountId: "relayer.myapp.near", privateKey: "..." },
            subAccount: { parentAccount: "user.parent.near", parentKey: "base64 ed25519:..." },
          });
        source: 'src/index.ts:1395-1400, src/index.ts:1419-1421'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['siwn']


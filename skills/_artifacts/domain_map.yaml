    failure_modes:
      - mistake: 'Calling buildSignedDelegateAction without connected wallet'
        mechanism: 'buildSignedDelegateAction reads accountId from nearState. If the wallet is not connected, nearState is null and the function throws with no clear UX feedback.'
        wrong_pattern: |
          // No wallet connected yet
          const payload = await authClient.near.buildSignedDelegateAction(
            "myapp.near",
            (builder, receiverId) => builder.functionCall(receiverId, "method", {})
          );
        correct_pattern: |
          // Check wallet state before building delegate action
          const accountId = authClient.near.getAccountId();
          if (!accountId) {
            // Prompt user to sign in first
            await authClient.signIn.near();
          }
          const payload = await authClient.near.buildSignedDelegateAction(
            "myapp.near",
            (builder, receiverId) => builder.functionCall(receiverId, "method", {})
          );
        source: 'src/client.ts:176-179'
        priority: 'HIGH'
        status: 'active'
        skills: ['client']
      - mistake: 'Using authClient.near.verify directly instead of signIn.near'
        mechanism: 'The verify endpoint requires a properly constructed request with signedMessage, message, recipient, nonce, and accountId. The signIn.near() method handles the full flow (wallet connect + sign + verify). Calling verify directly skips wallet connection and signing.'
        wrong_pattern: |
          // Manually calling verify without wallet signing
          await authClient.near.verify({
            signedMessage: someMessage,
            message: "Sign in to myapp.com",
            recipient: "myapp.com",
            nonce: someNonce,
            accountId: "alice.near",
          });
        correct_pattern: |
          // Use the single-step sign-in method
          await authClient.signIn.near({
            onSuccess: () => { /* signed in */ },
            onError: (error) => { console.error(error); },
          });
        source: 'src/client.ts:314-348'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['client']
      - mistake: 'Not listening to wallet disconnect events'
        mechanism: 'When the wallet disconnects externally (user signs out from wallet UI), the nearState atom is updated but UI components that do not subscribe to the atom will show stale account info.'
        wrong_pattern: |
          // Only read once
          const accountId = authClient.near.getAccountId();
          // Never updates when wallet disconnects
        correct_pattern: |
          // Subscribe to nearState for reactive updates
          import { useStore } from "nanostores/react";
          const { nearState } = authClient.$store;
          const state = useStore(nearState);
          // state.accountId is null when wallet disconnects
        source: 'src/client.ts:62,82-92'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['client']

tensions:
  - name: 'Ephemeral simplicity vs production reliability'
    skills: ['relay']
    description: 'Ephemeral mode is zero-config but requires funding an implicit account with no human-readable name; explicit mode uses a named account but requires managing private keys securely.'
    implication: 'Agents may default to ephemeral mode for simplicity without warning that the implicit account needs funding, or use explicit mode without securing the private key.'
  - name: 'Whitelist security vs development flexibility'
    skills: ['relay']
    description: 'Strict whitelistedContracts prevents relay abuse but blocks legitimate calls to new contracts during development; omitting the whitelist enables any contract call at the relayer expense.'
    implication: 'Agents may copy quickstart examples without whitelistedContracts into production code, or add overly permissive whitelists that defeat the security purpose.'
  - name: 'Type safety with better-auth peer dependency'
    skills: ['siwn', 'client']
    description: 'The $InferServerPlugin mechanism ensures client-server type alignment, but misconfigured Better Auth versions or missing type inference can cause runtime errors that pass type checking.'
    implication: 'Agents may write client code that compiles but fails at runtime because the server plugin configuration does not match the client expectations.'


    tasks:
      - 'Add SIWN plugin to Better Auth server config'
      - 'Generate database schema after adding the plugin'
      - 'Configure recipient, API key, and custom RPC URL'
      - 'Link or unlink NEAR accounts to authenticated sessions'
      - 'Look up NEAR user profiles'
      - 'Validate access keys (full access or function-call keys)'
    failure_modes:
      - mistake: 'Recipient mismatch between server and client'
        mechanism: 'The client sends a signed message with a different recipient than the server expects, causing verification to fail silently at the NEP-413 signature check.'
        wrong_pattern: |
          // Server
          siwn({ recipient: "myapp.near" })
          // Client
          siwnClient({ recipient: "myapp.com" })
        correct_pattern: |
          // Server
          siwn({ recipient: "myapp.com" })
          // Client
          siwnClient({ recipient: "myapp.com" })
        source: 'src/index.ts:225, src/client.ts:17'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['siwn', 'client']
      - mistake: 'Sending raw nonce bytes instead of hex-encoded string'
        mechanism: 'The nonce endpoint returns a hex-encoded string. The verify endpoint expects the same hex string. Sending raw bytes or a different encoding causes nonce decode failure.'
        wrong_pattern: |
          const nonce = new Uint8Array(32);
          await authClient.near.verify({
            signedMessage,
            message,
            recipient,
            nonce: nonce, // raw bytes, not hex string
            accountId,
          });
        correct_pattern: |
          const nonceBytes = generateNonce();
          const nonceHex = hex.encode(nonceBytes);
          // ...sign with nonceBytes via wallet...
          await authClient.near.verify({
            signedMessage,
            message,
            recipient,
            nonce: nonceHex, // hex-encoded string
            accountId,
          });
        source: 'src/types.ts:53-58, src/client.ts:106-109'
        priority: 'HIGH'
        status: 'active'
        skills: ['siwn', 'client']
      - mistake: 'Forgetting to generate DB schema after adding plugin'
        mechanism: 'The plugin adds nearAccount, relayedTransaction, and relayerKey tables. Without running the Better Auth CLI to generate the schema, the database will be missing these tables and all endpoints will fail.'
        wrong_pattern: |
          // Add siwn() to plugins, then start the server immediately
          export const auth = betterAuth({
            plugins: [siwn({ recipient: "myapp.com" })],
          });
        correct_pattern: |
          // Add siwn() to plugins, THEN generate schema
          export const auth = betterAuth({
            plugins: [siwn({ recipient: "myapp.com" })],
          });
          // Run: npx @better-auth/cli generate
        source: 'README.md:56-60'
        priority: 'HIGH'
        status: 'active'
        skills: ['siwn']
      - mistake: 'Network detected from wrong account ID format'
        mechanism: 'The network is auto-detected from accountId suffix (.testnet → testnet, otherwise → mainnet). Sending a mainnet accountId with networkId: "testnet" triggers a mismatch error.'
        wrong_pattern: |
          await authClient.near.nonce({
            accountId: "alice.near",
            networkId: "testnet", // mismatch — .near is mainnet
          });
        correct_pattern: |
          await authClient.near.nonce({
            accountId: "alice.near",
            networkId: "mainnet", // matches .near suffix
          });
        source: 'src/profile.ts:6-8, src/index.ts:546-552'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['siwn', 'client']

  - name: 'Gasless relay'
    slug: 'relay'
    domain: 'relay'
    description: 'Configure the gasless relayer (ephemeral or explicit mode), relay NEP-366 delegate actions on-chain, enforce contract whitelisting and gas/deposit limits, monitor relay status and history'
    type: 'core'
    covers:
      - 'relayer config (ephemeral vs explicit mode)'
      - 'relayerKey schema and encryption'
      - '/near/relay endpoint'
      - '/near/relay-status/:txHash endpoint'
      - '/near/relayer-info endpoint'
      - '/near/relay-history endpoint'
      - '/near/view endpoint'
      - 'whitelistedContracts'
      - 'maxGasPerTransaction / maxDepositPerTransaction'
      - 'RotatingKeyStore for high-throughput'
      - 'AES-256-GCM encryption of ephemeral private key'
    tasks:
      - 'Enable gasless relay with ephemeral or explicit relayer'
      - 'Fund the ephemeral relayer account with NEAR'
      - 'Configure contract whitelisting and gas/deposit limits'
      - 'Relay a delegate action from client to on-chain execution'
      - 'Check relay status and history'
      - 'Set up rotating keys for high-throughput relay'
    failure_modes:
      - mistake: 'Not funding the ephemeral relayer account'
        mechanism: 'Ephemeral mode generates an implicit account (hex of public key) that starts with zero balance. Without funding, every relay attempt fails with "insufficient balance".'
        wrong_pattern: |
          siwn({
            recipient: "myapp.com",
            relayer: {}, // ephemeral mode — but account has no NEAR
          });
        correct_pattern: |
          siwn({
            recipient: "myapp.com",
            relayer: {}, // ephemeral mode
          });
          // After startup, check logs for:
          // [siwn] Relayer created in EPHEMERAL mode: 7a3c4b5c...
          // Fund this account with NEAR to enable gasless relay
        source: 'src/index.ts:179-181, maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['relay']
      - mistake: 'Omitting whitelistedContracts in production'
        mechanism: "Without whitelistedContracts, the relay accepts delegate actions targeting any contract. This allows authenticated users to relay transactions to arbitrary contracts at the relayer's expense."
        wrong_pattern: |
          siwn({
            recipient: "myapp.com",
            relayer: {
              accountId: "relayer.myapp.near",
              privateKey: process.env.RELAYER_PRIVATE_KEY,
              // No whitelistedContracts — any contract can be called
            },
          });
        correct_pattern: |
          siwn({
            recipient: "myapp.com",
            relayer: {
              accountId: "relayer.myapp.near",
              privateKey: process.env.RELAYER_PRIVATE_KEY,
              whitelistedContracts: ["myapp.near"],
            },
          });
        source: 'src/index.ts:891-898, maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['relay']
      - mistake: 'Constructing transactions with wrong builder pattern'
        mechanism: 'Delegate actions must be built using near-kit TransactionBuilder with .delegate(). An agent might construct a raw transaction or use .send() directly instead of the delegate flow.'
        wrong_pattern: |
          // Wrong: trying to send directly instead of delegate
          const result = await near.transaction(accountId)
            .functionCall(receiverId, "method", args, { gas: Gas.Tgas(30) })
            .send({ waitUntil: "EXECUTED" });
        correct_pattern: |
          // Correct: build signed delegate action, then relay
          const payload = await authClient.near.buildSignedDelegateAction(
            "myapp.near",
            (builder, receiverId) => builder.functionCall(receiverId, "method", args, {
              gas: Gas.Tgas(30),
              attachedDeposit: BigInt(0),
            })
          );
          const result = await authClient.near.relayTransaction({ payload });
        source: 'src/client.ts:172-185, maintainer interview'
        priority: 'HIGH'
        status: 'active'
        skills: ['relay', 'client']
      - mistake: 'Missing BETTER_AUTH_SECRET for ephemeral relayer key encryption'
        mechanism: 'The ephemeral relayer encrypts its private key using BETTER_AUTH_SECRET as the KEK. If this env var is empty or missing, key derivation uses an empty string, which is insecure and may cause decryption failures on restart.'
        wrong_pattern: |
          // No BETTER_AUTH_SECRET set
          siwn({
            recipient: "myapp.com",
            relayer: {},
          });
        correct_pattern: |
          // BETTER_AUTH_SECRET is required for Better Auth and used by the relayer
          process.env.BETTER_AUTH_SECRET = "your-secret-here";
          siwn({
            recipient: "myapp.com",
            relayer: {},
          });
        source: 'src/utils.ts:21-41, src/index.ts:134'
        priority: 'HIGH'
        status: 'active'
        skills: ['relay']

  - name: 'Client integration'
    slug: 'client'
    domain: 'client'
    description: 'Set up the siwnClient plugin, configure wallet connection, use authClient.near actions for sign-in, profile, account management, delegate action building, and relay submission'
    type: 'core'
    covers:
      - 'siwnClient() plugin options'
      - 'authClient.near.* actions'
      - 'authClient.signIn.near()'
      - 'NearConnector wallet events'
      - 'nanostores nearState atom'
      - 'Near instance via fromNearConnect adapter'
    tasks:
      - 'Add siwnClient to Better Auth client config'
      - 'Sign in with NEAR wallet using signIn.near()'
      - 'Build and relay delegate actions'
      - 'Get profile, account ID, and wallet state'
      - 'Link, unlink, and list NEAR accounts'
      - 'Disconnect wallet'
      - 'Make read-only contract view calls'
    failure_modes:
      - mistake: 'Creating multiple siwnClient instances (stateful singleton)'
        mechanism: 'siwnClient() creates stateful singletons: nearState atom, walletConnected atom, NearConnector with event listeners, Near instance. A factory pattern creates independent instances, so wallet sign-in populates one while the app reads from another.'
        wrong_pattern: |
          // Factory — each call creates a new client with fresh state
          function getAuthClient(config) {
            return createAuthClient({
              plugins: [siwnClient({ recipient: getAccount(config) })],
            });
          }
        correct_pattern: |
          // Single module-level instance (CSR)
          export const authClient = createAuthClient({
            plugins: [siwnClient({ recipient: "myapp.com" })],
          });
          // Or router context singleton (SSR) — create once, access via context
        source: 'src/client.ts:64-72'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['client', 'tanstack']
      - mistake: 'Using near.client.send() without ensuring wallet connection'
        mechanism: 'Wallet extensions (Meteor, HERE) may disconnect after sign-in. Direct .send() on the client Near instance fails silently if the wallet is no longer connected, because there is no automatic reconnection check.'
        wrong_pattern: |
          // No ensureConnected() call
          authClient.near.client.transaction(accountId)
            .functionCall(contract, "method", args, opts)
            .send();
        correct_pattern: |
          // Reconnect wallet if needed
          await authClient.near.ensureConnected();
          authClient.near.client.transaction(accountId)
            .functionCall(contract, "method", args, opts)
            .send();
        source: 'src/client.ts:249-253, src/client.ts:310-317'
        priority: 'HIGH'
        status: 'active'
        skills: ['client', 'tanstack']
      - mistake: 'Constructing transactions with wrong builder pattern'
        mechanism: 'Delegate actions must be built using near-kit TransactionBuilder with .delegate(). Using .send() directly broadcasts from the client account, requiring the user to pay gas — defeating the gasless relay purpose.'
        wrong_pattern: |
          const result = await near.transaction(accountId)
            .functionCall(receiverId, "method", args, { gas: Gas.Tgas(30) })
            .send({ waitUntil: "EXECUTED" });
        correct_pattern: |
          const payload = await authClient.near.buildSignedDelegateAction(
            "myapp.near",
            (builder, receiverId) => builder.functionCall(receiverId, "method", args, {
              gas: Gas.Tgas(30),
              attachedDeposit: BigInt(0),
            })
          );
          const result = await authClient.near.relayTransaction({ payload });
        source: 'src/client.ts:240-260'
        priority: 'HIGH'
        status: 'active'
        skills: ['client', 'relay']
      - mistake: 'Using authClient.near.verify directly instead of signIn.near'
        mechanism: 'The verify endpoint requires a properly constructed request with signedMessage, message, recipient, nonce, and accountId. The signIn.near() method handles the full flow (wallet connect + sign + verify). Calling verify directly skips wallet connection and signing.'
        wrong_pattern: |
          await authClient.near.verify({
            signedMessage: someMessage,
            message: "Sign in to myapp.com",
            recipient: "myapp.com",
            nonce: someNonce,
            accountId: "alice.near",
          });
        correct_pattern: |
          await authClient.signIn.near({
            onSuccess: () => { /* signed in */ },
            onError: (error) => { console.error(error); },
          });
        source: 'src/client.ts:314-348'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['client']
      - mistake: 'Not listening to wallet disconnect events'
        mechanism: 'When the wallet disconnects externally (user signs out from wallet UI), the nearState atom is updated but UI components that do not subscribe to the atom will show stale account info.'
        wrong_pattern: |
          const accountId = authClient.near.getAccountId();
          // Never updates when wallet disconnects
        correct_pattern: |
          import { useStore } from "nanostores/react";
          const { nearState } = authClient.$store;
          const state = useStore(nearState);
          // state.publicKey becomes null, walletConnected becomes false
        source: 'src/client.ts:62,82-92'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['client']

  - name: 'TanStack Router integration'

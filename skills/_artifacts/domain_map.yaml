      - 'File consolidation (auth.ts)'
      - 'Wallet state and ensureConnected'
    tasks:
      - 'Set up auth client as router context singleton'
      - 'Wire auth client into router.tsx and router.server.tsx'
      - 'Use useAuthClient() in components'
      - 'Pass authClient directly to query options, not runtimeConfig'
      - 'Call ensureConnected() before signing operations'
      - 'Pass runtimeConfig when creating auth client on server'
    failure_modes:
      - mistake: 'Creating multiple siwnClient instances via factory'
        mechanism: 'A factory function creates a new auth client each call, each with its own nearState atom. Wallet sign-in populates one atom while the app reads from another, losing wallet state.'
        wrong_pattern: |
          function getAuthClient(config) {
            return createAuthClient({
              plugins: [siwnClient({ recipient: getAccount(config) })],
            });
          }
        correct_pattern: |
          // Module singleton (CSR)
          export const authClient = createAuthClient({
            plugins: [siwnClient({ recipient: "myapp.near" })],
          });
          // Or router context singleton (SSR)
          export function createAuthClient(opts?) { ... }
          // Create once in router setup, access via useAuthClient()
        source: 'src/client.ts:64-72'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['tanstack', 'client']
      - mistake: 'Threading runtimeConfig through query options and component props'
        mechanism: 'runtimeConfig was threaded through props and query options solely to create auth client instances. With router context, the auth client is a singleton accessed via useAuthClient(), eliminating config threading.'
        wrong_pattern: |
          export const sessionQueryOptions = (initialSession, runtimeConfig) => ({
            queryFn: () => getAuthClient(runtimeConfig).getSession(),
          });
        correct_pattern: |
          export const sessionQueryOptions = (authClient, initialSession?) => ({
            queryFn: () => authClient.getSession(),
          });
        source: 'auth.ts:54-67'
        priority: 'HIGH'
        status: 'active'
        skills: ['tanstack']
      - mistake: 'Using near.client.send() without ensureConnected'
        mechanism: 'Wallet extensions disconnect between sign-in and subsequent signing. Direct .send() on the client Near instance has no automatic reconnection check.'
        wrong_pattern: |
          authClient.near.client.transaction(accountId)
            .functionCall(contract, "method", args, opts)
            .send();
        correct_pattern: |
          await authClient.near.ensureConnected();
          authClient.near.client.transaction(accountId)
            .functionCall(contract, "method", args, opts)
            .send();
        source: 'src/client.ts:249-253'
        priority: 'HIGH'
        status: 'active'
        skills: ['tanstack', 'client']
      - mistake: 'Module-level singleton in SSR causes cross-request state leaks'
        mechanism: "On the server, a module-level singleton's $fetch and session state would be shared across concurrent requests. Router context isolates one client per request on server, one per app on client."
        wrong_pattern: |
          export const authClient = createAuthClient({
            plugins: [siwnClient({ recipient: "myapp.near" })],
          });
        correct_pattern: |
          export function createAuthClient(opts?) { ... }
          // Created in createRouter() context with runtimeConfig per request
        source: 'router.server.tsx:60-71'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['tanstack']
      - mistake: 'Calling createAuthClient() without runtimeConfig on the server'
        mechanism: 'getHostUrl(), getAccount(), and getNetworkId() read window.__RUNTIME_CONFIG__ by default. On the server, window is undefined, so they throw.'
        wrong_pattern: |
          // router.server.tsx
          authClient: createAuthClient(), // throws on server
        correct_pattern: |
          // router.server.tsx
          authClient: createAuthClient({ runtimeConfig: renderOptions.runtimeConfig }),
        source: 'auth.ts:18-27'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['tanstack']


tensions:
  - name: 'Ephemeral simplicity vs production reliability'
    skills: ['relay']
    description: 'Ephemeral mode is zero-config but requires funding an implicit account with no human-readable name; explicit mode uses a named account but requires managing private keys securely.'
    implication: 'Agents may default to ephemeral mode for simplicity without warning that the implicit account needs funding, or use explicit mode without securing the private key.'
  - name: 'Whitelist security vs development flexibility'
    skills: ['relay']
    description: 'Strict whitelistedContracts prevents relay abuse but blocks legitimate calls to new contracts during development; omitting the whitelist enables any contract call at the relayer expense.'
    implication: 'Agents may copy quickstart examples without whitelistedContracts into production code, or add overly permissive whitelists that defeat the security purpose.'
  - name: 'Type safety with better-auth peer dependency'
    skills: ['siwn', 'client']
    description: 'The $InferServerPlugin mechanism ensures client-server type alignment, but misconfigured Better Auth versions or missing type inference can cause runtime errors that pass type checking.'
    implication: 'Agents may write client code that compiles but fails at runtime because the server plugin configuration does not match the client expectations.'
  - name: 'Singleton vs factory pattern'
    skills: ['client', 'tanstack']
    description: 'siwnClient() creates stateful singletons (nearState, walletConnected atoms). A factory that creates new instances per call loses wallet state because each instance has independent atoms.'
    implication: 'Agents may use factory patterns that create multiple siwnClient instances, causing wallet sign-in to populate one atom while the app reads from another.'
  - name: 'Module singleton vs router context'
    skills: ['tanstack']
    description: 'Module-level singleton is shared across SSR requests, leaking $fetch and session state between concurrent requests. Router context isolates one client per request on server.'
    implication: 'Agents may use a module-level singleton in SSR apps, causing cross-request state leaks and hard-to-debug session bugs.'


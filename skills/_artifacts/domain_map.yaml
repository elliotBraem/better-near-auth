    failure_modes:
      - mistake: 'Not funding the ephemeral relayer account'
        mechanism: 'Ephemeral mode generates an implicit account (hex of public key) that starts with zero balance. Without funding, every relay attempt fails with "insufficient balance".'
        wrong_pattern: |
          siwn({
            recipient: "myapp.com",
            relayer: {}, // ephemeral mode — but account has no NEAR
          });
        correct_pattern: |
          siwn({
            recipient: "myapp.com",
            relayer: {}, // ephemeral mode
          });
          // After startup, check logs for:
          // [siwn] Relayer created in EPHEMERAL mode: 7a3c4b5c...
          // Fund this account with NEAR to enable gasless relay
        source: 'src/index.ts:179-181, maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['relay']
      - mistake: 'Omitting whitelistedContracts in production'
        mechanism: 'Without whitelistedContracts, the relay accepts delegate actions targeting any contract. This allows authenticated users to relay transactions to arbitrary contracts at the relayer's expense.'
        wrong_pattern: |
          siwn({
            recipient: "myapp.com",
            relayer: {
              accountId: "relayer.myapp.near",
              privateKey: process.env.RELAYER_PRIVATE_KEY,
              // No whitelistedContracts — any contract can be called
            },
          });
        correct_pattern: |
          siwn({
            recipient: "myapp.com",
            relayer: {
              accountId: "relayer.myapp.near",
              privateKey: process.env.RELAYER_PRIVATE_KEY,
              whitelistedContracts: ["myapp.near"],
            },
          });
        source: 'src/index.ts:891-898, maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['relay']
      - mistake: 'Constructing transactions with wrong builder pattern'
        mechanism: 'Delegate actions must be built using near-kit TransactionBuilder with .delegate(). An agent might construct a raw transaction or use .send() directly instead of the delegate flow.'
        wrong_pattern: |
          // Wrong: trying to send directly instead of delegate
          const result = await near.transaction(accountId)
            .functionCall(receiverId, "method", args, { gas: Gas.Tgas(30) })
            .send({ waitUntil: "EXECUTED" });
        correct_pattern: |
          // Correct: build signed delegate action, then relay
          const payload = await authClient.near.buildSignedDelegateAction(
            "myapp.near",
            (builder, receiverId) => builder.functionCall(receiverId, "method", args, {
              gas: Gas.Tgas(30),
              attachedDeposit: BigInt(0),
            })
          );
          const result = await authClient.near.relayTransaction({ payload });
        source: 'src/client.ts:172-185, maintainer interview'
        priority: 'HIGH'
        status: 'active'
        skills: ['relay', 'client']
      - mistake: 'Missing BETTER_AUTH_SECRET for ephemeral relayer key encryption'
        mechanism: 'The ephemeral relayer encrypts its private key using BETTER_AUTH_SECRET as the KEK. If this env var is empty or missing, key derivation uses an empty string, which is insecure and may cause decryption failures on restart.'
        wrong_pattern: |
          // No BETTER_AUTH_SECRET set
          siwn({
            recipient: "myapp.com",
            relayer: {},
          });
        correct_pattern: |
          // BETTER_AUTH_SECRET is required for Better Auth and used by the relayer
          process.env.BETTER_AUTH_SECRET = "your-secret-here";
          siwn({
            recipient: "myapp.com",
            relayer: {},
          });
        source: 'src/utils.ts:21-41, src/index.ts:134'
        priority: 'HIGH'
        status: 'active'
        skills: ['relay']

  - name: 'Client integration'

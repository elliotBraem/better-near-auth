    failure_modes:
      - mistake: 'Recipient mismatch between server and client'
        mechanism: 'The client sends a signed message with a different recipient than the server expects, causing verification to fail silently at the NEP-413 signature check.'
        wrong_pattern: |
          // Server
          siwn({ recipient: "myapp.near" })
          // Client
          siwnClient({ recipient: "myapp.com" })

    failure_modes:
      - mistake: 'SIWN recipient mismatch between bos.config.json and server'
        mechanism: 'The UI client reads the recipient from runtimeConfig.auth.variables.siwn and embeds it in the NEP-413 signed message. The server verifies against its own siwn() recipient. A mismatch causes verification to fail with "Invalid signature".'
        wrong_pattern: |
          // bos.config.json — variables.siwn
          { "recipient": "myapp.near" }
          // Server plugin (auth-instance.ts)
          siwn({ recipient: "myapp.com" }) // different!
        correct_pattern: |
          // bos.config.json
          { "recipient": "myapp.near" }
          // Server — same recipient
          siwn({ recipient: "myapp.near" })
        source: 'bos.config.json, plugins/auth/src/auth-instance.ts'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['auth-plugin', 'siwn', 'client']
      - mistake: 'Not forwarding headers in SSR auth client'
        mechanism: 'The Better Auth client resolves sessions via HTTP cookies. On the server, request.headers must be forwarded to the auth client so it can read the cookie header. Without headers, getSession() returns null during SSR.'
        wrong_pattern: |
          // router.server.tsx
          authClient: createAuthClient({ runtimeConfig: renderOptions.runtimeConfig }),
          // No headers — SSR cannot read session cookies
        correct_pattern: |
          authClient: createAuthClient({
            runtimeConfig: renderOptions.runtimeConfig,
            headers: request.headers,
            cspNonce: renderOptions.cspNonce,
          }),
        source: 'ui/src/router.server.tsx'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['auth-plugin', 'tanstack']
      - mistake: 'Using apiClient.auth.* instead of authClient for auth actions'
        mechanism: 'The auth plugin exposes endpoints via both the oRPC contract (apiClient.auth.*) and the Better Auth HTTP handler (authClient.*). Auth actions must go through the Better Auth client because it handles cookies, CSRF tokens, and plugin-specific client logic.'
        wrong_pattern: |
          const api = useApiClient();
          await api.auth.getSession(); // oRPC call — no cookie handling
        correct_pattern: |
          const auth = useAuthClient();
          const { data: session } = await auth.getSession(); // Better Auth client — cookies
        source: 'ui/src/lib/api.ts, ui/src/lib/auth.ts'
        priority: 'HIGH'
        status: 'active'
        skills: ['auth-plugin']
      - mistake: 'Forgetting inferAdditionalFields<Auth>()'
        mechanism: 'Without inferAdditionalFields<Auth>(), the auth client $Infer types do not include fields added by the plugin (isAnonymous, NEAR account fields, organization fields). Custom fields are typed as unknown.'
        wrong_pattern: |
          plugins: [
            siwnClient({ recipient, networkId }),
            // no inferAdditionalFields — custom fields untyped
          ],
        correct_pattern: |
          plugins: [
            inferAdditionalFields<Auth>(),
            siwnClient({ recipient, networkId }),
          ],
        source: 'ui/src/lib/auth.ts'
        priority: 'HIGH'
        status: 'active'
        skills: ['auth-plugin']
      - mistake: 'Not refreshing session cache after sign-in/sign-out'
        mechanism: 'TanStack Query caches the session with staleTime: 60s. After sign-in, the cache still holds the previous null session. Without setQueryData + invalidateQueries, the _authenticated layout redirects back to login.'
        wrong_pattern: |
          await auth.signIn.near({ onSuccess: () => navigate({ to: "/home" }) });
          // Session cache stale — _authenticated layout redirects back to login
        correct_pattern: |
          await auth.signIn.near({
            onSuccess: async () => {
              const { data: freshSession } = await auth.getSession();
              queryClient.setQueryData(["session"], freshSession);
              await queryClient.invalidateQueries({ queryKey: ["session"] });
              navigate({ to: "/home" });
            },
          });
        source: 'ui/src/routes/_layout/login.tsx'
        priority: 'HIGH'
        status: 'active'
        skills: ['auth-plugin', 'tanstack']
      - mistake: 'Missing credentials: "include" in auth client'
        mechanism: 'Better Auth uses HTTP-only cookies for session management. Without credentials: "include", the browser does not send cookies with auth requests, so getSession() always returns null.'
        wrong_pattern: |
          createBetterAuthClient({
            baseURL: hostUrl,
            // no fetchOptions — cookies not sent
            plugins: [siwnClient({ recipient })],
          });
        correct_pattern: |
          createBetterAuthClient({
            baseURL: hostUrl,
            fetchOptions: { credentials: "include" },
            plugins: [siwnClient({ recipient })],
          });
        source: 'ui/src/lib/auth.ts'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['auth-plugin', 'tanstack']

tensions:
  - name: 'Ephemeral simplicity vs production reliability'
    skills: ['relay']
    description: 'Ephemeral mode is zero-config but requires funding an implicit account with no human-readable name; explicit mode uses a named account but requires managing private keys securely.'
    implication: 'Agents may default to ephemeral mode for simplicity without warning that the implicit account needs funding, or use explicit mode without securing the private key.'
  - name: 'Whitelist security vs development flexibility'
    skills: ['relay']
    description: 'Strict whitelistedContracts prevents relay abuse but blocks legitimate calls to new contracts during development; omitting the whitelist enables any contract call at the relayer expense.'
    implication: 'Agents may copy quickstart examples without whitelistedContracts into production code, or add overly permissive whitelists that defeat the security purpose.'
  - name: 'Type safety with better-auth peer dependency'
    skills: ['siwn', 'client']
    description: 'The $InferServerPlugin mechanism ensures client-server type alignment, but misconfigured Better Auth versions or missing type inference can cause runtime errors that pass type checking.'
    implication: 'Agents may write client code that compiles but fails at runtime because the server plugin configuration does not match the client expectations.'
  - name: 'Singleton vs factory pattern'
    skills: ['client', 'tanstack']
    description: 'siwnClient() creates stateful singletons (nearState, walletConnected atoms). A factory that creates new instances per call loses wallet state because each instance has independent atoms.'
    implication: 'Agents may use factory patterns that create multiple siwnClient instances, causing wallet sign-in to populate one atom while the app reads from another.'
  - name: 'Module singleton vs router context'
    skills: ['tanstack']
    description: 'Module-level singleton is shared across SSR requests, leaking $fetch and session state between concurrent requests. Router context isolates one client per request on server.'
    implication: 'Agents may use a module-level singleton in SSR apps, causing cross-request state leaks and hard-to-debug session bugs.'
  - name: 'oRPC vs Better Auth client for auth actions'
    skills: ['auth-plugin']
    description: 'The auth plugin exposes endpoints via both the oRPC contract and the Better Auth HTTP handler. Auth actions must go through the Better Auth client for cookie/CSRF handling.'
    implication: 'Agents may call auth endpoints via the oRPC API client instead of the Better Auth client, missing cookie handling and causing silent auth failures.'
  - name: 'Runtime config vs build-time config for SIWN recipient'
    skills: ['auth-plugin', 'siwn']
    description: 'The SIWN recipient is read from runtimeConfig.auth.variables at runtime. Hardcoding it in the UI instead of reading from runtime config causes mismatch when deploying to different networks.'
    implication: 'Agents may hardcode the recipient in the UI auth client instead of reading from runtimeConfig, causing NEP-413 verification failures on different deployments.'


    description: 'Set up the SIWN server plugin, configure NEP-413 authentication, handle nonce/verify endpoints, link and unlink NEAR accounts, and look up user profiles'
    type: 'core'
    covers:
      - 'siwn() plugin options'
      - '/near/nonce endpoint'
      - '/near/verify endpoint'
      - '/near/link-account endpoint'
      - '/near/unlink-account endpoint'
      - '/near/list-accounts endpoint'
